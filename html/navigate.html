<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vault</title>
    <script
      type="application/javascript"
      src="/lib/browser-polyfill.min.js"
    ></script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <dialog id="dialog-form-create" class="dialog">
      <form>
        <h2 class="dialog__title" data-i18n="dialog_add_secret"></h2>
        <fieldset class="dialog__body">
          <label class="label"><span data-i18n="secret_name"></span>
            <input type="text" name="secret-name" class="input" required>
          </label>
          <label class="label"><span data-i18n="secret_value"></span>
            <input type="text" name="secret-value" class="input" required>
          </label>
        </fieldset>
        <menu class="dialog__actions">
          <button type="button" class="button" value="cancel" data-i18n="cancel"></button>
          <button type="submit" class="button button--primary" data-i18n="save"></button>
        </menu>
      </form>
    </dialog>

    <dialog id="dialog-form-edit" class="dialog">
      <form>
        <h2 class="dialog__title" data-i18n="dialog_edit_secret"></h2>
        <fieldset class="dialog__body">
          <label class="label"><span data-i18n="secret_name"></span>
            <input type="text" name="secret-name" class="input" disabled>
          </label>
          <label class="label"><span data-i18n="secret_value"></span>
            <input type="text" name="secret-value" class="input" required>
          </label>
        </fieldset>
        <menu class="dialog__actions">
          <button type="button" class="button" value="cancel" data-i18n="cancel"></button>
          <button type="submit" class="button button--primary" data-i18n="save"></button>
        </menu>
      </form>
    </dialog>

    <dialog id="dialog-form-select-keys" class="dialog">
      <h2 class="dialog__title" data-i18n="dialog_select_key"></h2>
      <div class="dialog__body" data-choices></div>
      <menu class="dialog__actions">
        <button type="button" class="button" value="cancel" data-i18n="cancel"></button>
      </menu>
    </dialog>

    <dialog id="dialog-reveal" class="dialog">
      <h2 class="dialog__title" data-i18n="dialog_reveal_secret"></h2>
      <div class="dialog__body">
        <p class="dialog__secret-value" data-reveal-value></p>
      </div>
      <menu class="dialog__actions">
        <button type="button" class="button" data-reveal-copy data-i18n="copy_clipboard"></button>
        <button type="button" class="button button--primary" value="cancel" data-i18n="close"></button>
      </menu>
    </dialog>

    <header class="header">
      <div class="header__container">
        <h1 class="h1 title">Vault</h1>
        <nav role="navigation" class="menu" aria-label="Main Menu">
          <ul class="menu__links">
            <li>
              <a href="/html/navigate.html" class="link link--alt link--current"><span data-i18n="browse_secrets"></span>
              </a>
            </li>
            <li><a href="/html/options.html" class="link link--alt">Options</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="main">
      <div role="alert" id="notify" aria-live="assertive"></div>
      <div class="search-container">
        <label class="label"><span data-i18n="search_secret"></span>
          <input
          type="text"
          id="vault-search"
          class="input"
          size="30"
        />
        </label>
      </div>
      <div id="result">
        <div class="result-header">
          <button id="go-beginning" class="header-button"></button>
          <button id="go-up" class="header-button"></button>
          <div id="current-path"></div>
        </div>
        <button id="add-secret" class="button">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon icon--inline">
            <use xlink:href="../icons/add.svg#add-secret"/>
            </svg>
        </button>
        <ul class="list" id="resultList">
        </ul>
      </div>

    </main>

    <script src="/lib/navigate.js" type="module"></script>

  </body>
</html>
